version: 2

updates:
  # Root workspace
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      dev-dependencies:
        dependency-type: development

  # apps/web
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday

  # apps/server
  - package-ecosystem: npm
    directory: /apps/server
    schedule:
      interval: weekly
      day: monday

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
